<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" context="阿建的网站">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿建的网站</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            vertical-align: middle;
            margin: 0px;
            background-image: url(img/background.jpg);
            background-repeat: no-repeat;
            background-size: 100%;
            background-color: rgb(40,40,40);
        }
        .header {
            height: 40px;
            background-color: rgb(0, 0, 0,0.5);
        }
        .header span {
            float: left;
            color: rgb(255, 255, 255);
            line-height: 40px;
            font-weight: 400;
            font-size: 20px;
            margin: 0 20px;
        }
        .header em {
            float: right;
            color: rgb(255, 255, 255);
            line-height: 40px;
            font-weight: 400;
            font-size: 20px;
            margin: 0 20px;
        }
        .conter {
            height: calc(100vh - 40px - 50px);
            background-color: rgb(200, 200, 200,0.2);
        }
        .conter h1 {
            text-align: center;
            line-height: calc(100vh - 40px - 50px);
            font-size: calc(5vw);
        }
        .footer {
            height: 50px;
            /* margin-top: -50px; */
            width: 100%;
            background-color: rgb(0, 0, 0,0.5);
            position: absolute;
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>阿建</span>
        <a href="testing/testing.html">测试页面</a>
        <em>联系阿建</em>
    </div>
    <div class="conter">
        <h1>欢迎！这里是阿建的个人网站！</h1>
    </div>
    <div class="footer">
        
    </div>
</body>
</html>
